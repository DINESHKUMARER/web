<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            
    
        }

        .products{
           border: 1px solid black;
           border-radius: 20px;
           width: 200px;
           padding: 20px;
           margin-bottom: 20px;

           text-align: center;
           box-shadow: 3px    3px     6px   black;
        }
        

        .products h2 {
            border-bottom: 1px solid black;
        }

        .products img{
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
        }

        .products button{
            background-color: yellow;
            border: none;
            padding: 10px;
            border-radius: 20px;
            width: 90%;
        }
           
    </style>
</head>
<body>
    <div class="products">
       <img src="https://images.pexels.com/photos/27272550/pexels-photo-27272550.jpeg" >  
       <h2>Face Wash</h2>
       <p>₹499</p>
       <button>Buy Now</button>
    </div>
      
    <div class="products">
       <img src="https://images.pexels.com/photos/8709566/pexels-photo-8709566.jpeg" >  
       <h2>Face Serum</h2>
       <p>₹750</p>
       <button>Buy Now</button>
    </div>

    <div class="products">
       <img src="https://images.pexels.com/photos/27393249/pexels-photo-27393249.jpeg">  
       <h2>Moisturizer</h2>
       <p>₹699</p>
       <button>Buy Now</button>
    </div>

    <div class="products">
       <img src="https://images.pexels.com/photos/13779260/pexels-photo-13779260.jpeg" >  
       <h2>Sunscreen</h2>
       <p>₹800</p>
       <button>Buy Now</button>
    </div>
    

</body>
</html>
